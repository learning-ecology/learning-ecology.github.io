<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrator — Learning Ecology</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* apply dark mode before first paint: saved choice, else device preference */
    try { var __t = localStorage.getItem("hub_theme");
      if (__t === "dark" || (!__t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#17263e" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Learning Ecology" />
</head>
<body>
  <header class="topbar">
    <span class="brand"><img src="icons/icon-192.png" alt="" />Learning Ecology</span>
    <div style="display:flex; align-items:center; gap:0.4rem;">
      <span id="bell-slot"></span>
      <button class="ghost" id="lang-btn"></button>
      <span class="who" id="who"></span>
      <button class="ghost" id="signout"></button>
    </div>
  </header>

  <main class="container" id="app"></main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/umd/lucide.min.js"></script>
  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script>
    const { t2, toast, confirmDialog, promptDialog, skeleton, csv, icon,
            refreshIcons, wireLangButton, rerender, membership, memberBadge } = window.UI;
    const isPremRow = s => ["premium", "teacher-prem"].includes(membership(s).key);
    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null, myOrg = null;
    let tab = localStorage.getItem("hub_admin_tab") || "overview";
    if (tab === "people") tab = "teachers";

    document.getElementById("signout").textContent = t2("sign_out");
    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "login.html";
    });
    wireLangButton(document.getElementById("lang-btn"));

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }
    const fmtTime = s => !s ? "—" : (s < 60 ? "<1 min" : Math.round(s / 60) + " min");
    const nameOf = p => p?.full_name || p?.email || "—";
    const dstr = d => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    const addDaysStr = (base, n) => { const d = base ? new Date(base) : new Date(); d.setDate(d.getDate() + n); return dstr(d); };

    async function callFn(payload) {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(SUPABASE_URL + "/functions/v1/manage-user", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   Authorization: "Bearer " + session.access_token,
                   apikey: SUPABASE_ANON_KEY },
        body: JSON.stringify(payload)
      });
      const out = await res.json();
      if (!res.ok || out.error) throw new Error(out.error || "Request failed");
      return out;
    }

    async function start() {
      app.innerHTML = skeleton(3);
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }
      user = session.user;
      const { data: me } = await sb.from("profiles")
        .select("full_name, role, org_id").eq("id", user.id).single();
      if (me?.role !== "admin") { window.location.href = "dashboard.html"; return; }
      myOrg = me.org_id;
      who.textContent = me.full_name || user.email;
      window.UI.initBell(document.getElementById("bell-slot"));
      render();
    }

    async function render() {
      // RLS limits every query to this admin's own organization.
      const [{ data: orgRows }, { data: licenses }, { data: courses },
             { data: lessons }, { data: people }, { data: tcs },
             { data: enrollments }, { data: prog }, { data: activity },
             { data: anns }, { data: asgns }, { data: subs }] = await Promise.all([
        sb.from("organizations").select("*"),
        sb.from("course_licenses").select("*"),
        sb.from("courses").select("id, title, color").order("sort_order"),
        sb.from("lessons").select("id, title, course_id"),
        sb.from("profiles")
          .select("id, full_name, email, role, access_start, access_expires, suspended, plan, premium_until")
          .order("created_at"),
        sb.from("teacher_courses").select("teacher_id, course_id"),
        sb.from("enrollments").select("id, student_id, course_id, teacher_id, created_at"),
        sb.from("progress").select("student_id, lesson_id, status, updated_at"),
        sb.from("lesson_activity").select("student_id, lesson_id, kind, key, value, max_value, updated_at"),
        sb.from("announcements").select("*").order("created_at", { ascending: false }),
        sb.from("assignments").select("*"),
        sb.from("submissions").select("*")
      ]);

      const org = (orgRows || [])[0];
      const teachers = (people || []).filter(p => p.role === "teacher");
      const students = (people || []).filter(p => p.role === "student");
      const cTitle = id => (courses || []).find(c => c.id === id)?.title || "—";
      const pById = id => (people || []).find(p => p.id === id);
      const seatUse = cid => (enrollments || []).filter(e => e.course_id === cid).length;

      const timeBy = {}, doneBy = {}, lastBy = {};
      (activity || []).forEach(a => {
        if (a.kind === "time" && a.key === "total")
          timeBy[a.student_id] = (timeBy[a.student_id] || 0) + (Number(a.value) || 0);
        if (a.updated_at && (!lastBy[a.student_id] || a.updated_at > lastBy[a.student_id]))
          lastBy[a.student_id] = a.updated_at;
      });
      (prog || []).forEach(p => {
        if (p.status === "completed") doneBy[p.student_id] = (doneBy[p.student_id] || 0) + 1;
        if (p.updated_at && (!lastBy[p.student_id] || p.updated_at > lastBy[p.student_id]))
          lastBy[p.student_id] = p.updated_at;
      });

      const stat = (k, v, sub) =>
        `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
      const teacherOptions = teachers.map(p => `<option value="${p.id}">${esc(nameOf(p))}</option>`).join("");
      const studentOptions = students.map(p => `<option value="${p.id}">${esc(nameOf(p))}</option>`).join("");
      const licCourseOptions = (licenses || []).map(l =>
        `<option value="${l.course_id}">${esc(cTitle(l.course_id))}</option>`).join("");

      // ---- attention banner ----
      const today = new Date(); today.setHours(0,0,0,0);
      const expSoon = (licenses || []).filter(l => {
        if (!l.expires_on) return false;
        const d = Math.round((new Date(l.expires_on) - today) / 86400000);
        return d >= 0 && d <= 30;
      });
      const seatWarn = (licenses || []).filter(l =>
        l.seats && seatUse(l.course_id) >= l.seats * 0.8);
      const attention = (expSoon.length || seatWarn.length) ? `
        <div class="attention">${icon("alert-triangle")} <b>${t2("needs_attention")}</b>
          <ul>
            ${expSoon.map(l => `<li>${esc(cTitle(l.course_id))} — ${t2("valid_until")} ${esc(l.expires_on)} (${t2("expiring_soon")})</li>`).join("")}
            ${seatWarn.map(l => `<li>${esc(cTitle(l.course_id))} — ${seatUse(l.course_id)}/${l.seats} ${t2("seats_used")}</li>`).join("")}
          </ul>
        </div>` : "";

      const seatBar = l => {
        if (!l.seats) return "";
        const pct = Math.min(100, Math.round(seatUse(l.course_id) / l.seats * 100));
        const cls = pct >= 100 ? "full" : (pct >= 80 ? "warn" : "");
        return `<div class="seatbar ${cls}"><span style="width:${pct}%;"></span></div>`;
      };

      const accPill = s => {
        const expired = s.access_expires && s.access_expires < dstr(new Date());
        return s.suspended ? `<span class="pill off">${t2("suspended")}</span>`
          : expired ? `<span class="pill bad">${t2("expired")}</span>`
          : !s.access_expires ? `<span class="pill done">${t2("unlimited")}</span>`
          : `<span class="pill done">${t2("until")} ${esc(s.access_expires)}</span>`;
      };

      // ---- report computations ----
      const bestScoresIn = (ls, sid) => {
        const rows = (activity || []).filter(a =>
          a.kind === "activity" && a.key !== "opened" && Number(a.max_value) > 1
          && ls.some(x => x.id === a.lesson_id)
          && (sid == null || a.student_id === sid));
        return rows.length
          ? Math.round(rows.reduce((s, a) => s + (Number(a.value) || 0) / Number(a.max_value), 0) / rows.length * 100) + "%"
          : "—";
      };
      const courseRows = (licenses || []).map(l => {
        const ls = (lessons || []).filter(x => x.course_id === l.course_id);
        const enr = (enrollments || []).filter(e => e.course_id === l.course_id);
        const compl = enr.length && ls.length
          ? Math.round(enr.reduce((s, e) => s + (prog || []).filter(p =>
              p.student_id === e.student_id && p.status === "completed"
              && ls.some(x => x.id === p.lesson_id)).length / ls.length, 0) / enr.length * 100)
          : 0;
        const time = (activity || []).filter(a => a.kind === "time" && a.key === "total"
          && ls.some(x => x.id === a.lesson_id)).reduce((s, a) => s + (Number(a.value) || 0), 0);
        return { title: cTitle(l.course_id), enrolled: enr.length, compl,
                 score: bestScoresIn(ls, null), time };
      });
      const teacherRows = teachers.map(tc => {
        const stuIds = new Set((enrollments || []).filter(e => e.teacher_id === tc.id).map(e => e.student_id));
        return { name: nameOf(tc), students: stuIds.size,
                 compl: (prog || []).filter(p => stuIds.has(p.student_id) && p.status === "completed").length,
                 time: [...stuIds].reduce((s, id) => s + (timeBy[id] || 0), 0) };
      });

      const tabs = [["overview", t2("overview")], ["people", t2("people")],
                    ["enroll", t2("enrollments")], ["reports", t2("reports")],
                    ["announce", t2("announcements")]];

      app.innerHTML = `
        <p class="eyebrow">${t2("org_admin")}</p>
        <h1>${esc(org?.name || "—")}</h1>

        <div class="tabpane" data-tab="overview">
          ${attention}
          <div class="stat-grid">
            ${stat(t2("teachers"), teachers.length)}
            ${stat(t2("students"), students.length)}
            ${stat(t2("licensed_courses"), (licenses || []).length)}
            ${stat(t2("lessons_completed"), (prog || []).filter(p => p.status === "completed").length)}
          </div>
          <div class="card">
            <div class="card-head"><h2>${icon("book-open", 18)} ${t2("our_licenses")}</h2></div>
            ${(licenses || []).map(l => `
              <div class="lesson">
                <span class="icon">${icon("book-open")}</span>
                <div class="meta">
                  <div class="title">${esc(cTitle(l.course_id))}</div>
                  <span class="kind">${seatUse(l.course_id)}${l.seats ? " / " + l.seats : ""} ${t2("seats_used")} ·
                    ${l.expires_on ? t2("valid_until") + " " + esc(l.expires_on) : t2("no_expiry")}</span>
                  ${seatBar(l)}
                </div>
              </div>`).join("") || `<p class="empty">${t2("no_licenses")}</p>`}
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("palette", 18)} ${t2("branding")}</h2></div>
            <p class="kind" style="margin:0 0 0.4rem;">${t2("brand_hint")}</p>
            <div class="brand-swatches">${window.UI.BRAND_PRESETS.map(c =>
              `<button data-c="${c}" class="${(org?.brand_color || "") === c ? "on" : ""}" style="background:${c};" title="${c}"></button>`).join("")}</div>
            <div class="form-row">
              <div class="field" style="max-width:110px;"><label>&nbsp;</label>
                <input type="color" id="br-color" value="${esc(org?.brand_color || "#1e4f8f")}" style="height:42px; padding:0.2rem;" /></div>
              <button id="br-save">${t2("save")}</button>
              <button class="ghost" id="br-reset">${t2("reset_default")}</button>
            </div>
          </div>
        </div>

        <div class="tabpane" data-tab="teachers">
          <div class="card">
            <div class="card-head"><h2>${icon("user-plus", 18)} ${t2("create_account")}</h2></div>
            <div class="form-row">
              <div class="field"><label>${t2("email")}</label><input id="nu-email" placeholder="name@example.com" /></div>
              <div class="field" style="max-width:170px;"><label>${t2("password")}</label><input id="nu-pass" placeholder="${t2("pw_min6")}" /></div>
              <div class="field"><label>${t2("full_name_opt")}</label><input id="nu-name" /></div>
              <div class="field" style="max-width:150px;"><label>${t2("role")}</label>
                <select id="nu-role">
                  <option value="teacher">${t2("teacher")}</option>
                  <option value="student">${t2("student")}</option>
                </select></div>
              <button id="nu-add">${t2("create")}</button>
            </div>
            <label style="font-size:0.85rem; color:var(--muted); cursor:pointer; display:block; margin-top:0.5rem;">
              <input type="checkbox" id="nu-invite" /> ${t2("invite_instead")}
            </label>
            <p class="kind" id="nu-invite-note" style="display:none; margin:0.3rem 0 0;">${t2("invite_note")}</p>
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("graduation-cap", 18)} ${t2("teachers")}</h2></div>
            ${teachers.length ? `
            <table class="stackable">
              <thead><tr><th>${t2("teacher")}</th><th>${t2("email")}</th><th>${t2("students")}</th><th>${t2("actions")}</th></tr></thead>
              <tbody>${teachers.map(p => `
                <tr>
                  <td data-th="${t2("teacher")}">${esc(nameOf(p))}</td>
                  <td data-th="${t2("email")}">${esc(p.email || "—")}</td>
                  <td data-th="${t2("students")}">${new Set((enrollments || []).filter(e => e.teacher_id === p.id).map(e => e.student_id)).size}</td>
                  <td style="white-space:nowrap;">
                    <button class="ghost u-reset" data-id="${p.id}" data-name="${esc(nameOf(p))}">${icon("key-round")} ${t2("reset_pw")}</button>
                    <button class="ghost u-del" data-id="${p.id}" data-name="${esc(nameOf(p))}"
                            style="color:var(--danger); border-color:var(--danger);">${icon("trash-2")} ${t2("delete_")}</button>
                  </td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty">${t2("no_teachers")}</p>`}

            <div class="form-row" style="margin-top:1rem;">
              <div class="field"><label>${t2("assign_title")}</label>
                <select id="tc-teacher">${teacherOptions || `<option value="">${t2("no_teachers")}</option>`}</select></div>
              <div class="field"><label>${t2("course")}</label>
                <select id="tc-course">${licCourseOptions || `<option value="">${t2("no_courses")}</option>`}</select></div>
              <button id="tc-add">${t2("assign")}</button>
            </div>
            ${(tcs || []).length ? `
            <table class="stackable" style="margin-top:0.75rem;">
              <thead><tr><th>${t2("teacher")}</th><th>${t2("course")}</th><th></th></tr></thead>
              <tbody>${(tcs || []).map(t => `
                <tr>
                  <td data-th="${t2("teacher")}">${esc(nameOf(pById(t.teacher_id)))}</td>
                  <td data-th="${t2("course")}">${esc(cTitle(t.course_id))}</td>
                  <td><button class="ghost tc-remove" data-t="${t.teacher_id}" data-c="${t.course_id}">${t2("remove")}</button></td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty" style="margin-top:0.75rem;">${t2("no_assignments")}</p>`}
          </div>

        </div>

        <div class="tabpane" data-tab="students">
          <div class="card">
            <div class="card-head">
              <h2>${icon("users", 18)} ${t2("students_access")}</h2>
              <button class="ghost" id="stu-csv">${icon("download")} ${t2("export_csv")}</button>
            </div>
            ${students.length ? `
            <table class="stackable">
              <thead><tr><th>${t2("student")}</th><th>${t2("access")}</th><th>${t2("completed")}</th>
                <th>${t2("study_time")}</th><th>${t2("last_active")}</th><th>${t2("actions")}</th></tr></thead>
              <tbody>${students.map(s => `
                <tr class="${isPremRow(s) ? "row-premium" : ""}">
                  <td data-th="${t2("student")}">${esc(nameOf(s))} ${memberBadge(s)}<div class="kind">${esc(s.email || "")}</div></td>
                  <td data-th="${t2("access")}">${accPill(s)}${s.plan === "premium" && s.premium_until ? ` <span class="kind">👑 → ${esc(s.premium_until)}</span>` : ""}</td>
                  <td data-th="${t2("completed")}">${doneBy[s.id] || 0}</td>
                  <td data-th="${t2("study_time")}">${fmtTime(timeBy[s.id] || 0)}</td>
                  <td data-th="${t2("last_active")}">${lastBy[s.id] ? new Date(lastBy[s.id]).toLocaleDateString() : t2("never")}</td>
                  <td style="white-space:nowrap;">
                    <button class="ghost st-ext" data-id="${s.id}" data-d="30">+30d</button>
                    <button class="ghost st-ext" data-id="${s.id}" data-d="90">+90d</button>
                    <button class="ghost st-unlim" data-id="${s.id}">∞</button>
                    <button class="ghost st-susp" data-id="${s.id}"
                      ${s.suspended ? "" : 'style="color:var(--danger); border-color:var(--danger);"'}>
                      ${s.suspended ? t2("reactivate") : t2("suspend")}</button>
                    <button class="ghost pm-tgl" data-id="${s.id}" data-p="${s.plan === "premium" ? "free" : "premium"}">${s.plan === "premium" ? "→ " + t2("free_plan") : "👑"}</button>
                    <button class="ghost u-reset" data-id="${s.id}" data-name="${esc(nameOf(s))}">${icon("key-round")}</button>
                    <button class="ghost u-del" data-id="${s.id}" data-name="${esc(nameOf(s))}"
                            style="color:var(--danger); border-color:var(--danger);">${icon("trash-2")}</button>
                  </td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty">${t2("no_students")}</p>`}
          </div>
        </div>

        <div class="tabpane" data-tab="classes"><div id="cls-root"></div></div>

        <div class="tabpane" data-tab="assigned"><div id="ac-root"></div></div>

        <div class="tabpane" data-tab="enroll">
          <div class="card">
            <div class="card-head">
              <h2>${icon("book-plus", 18)} ${t2("enroll_title")}</h2>
              <button class="ghost" id="enr-csv">${icon("download")} ${t2("export_csv")}</button>
            </div>
            <div class="form-row">
              <div class="field"><label>${t2("student")}</label>
                <select id="en-student">${studentOptions || `<option value="">${t2("no_students")}</option>`}</select></div>
              <div class="field"><label>${t2("course")}</label>
                <select id="en-course">${licCourseOptions || `<option value="">${t2("no_courses")}</option>`}</select></div>
              <div class="field"><label>${t2("their_teacher")}</label>
                <select id="en-teacher">${teacherOptions || `<option value="">${t2("no_teachers")}</option>`}</select></div>
              <button id="en-add">${t2("enroll")}</button>
            </div>
            ${(enrollments || []).length ? `
            <table class="stackable" style="margin-top:0.75rem;">
              <thead><tr><th>${t2("student")}</th><th>${t2("course")}</th><th>${t2("teacher")}</th><th></th></tr></thead>
              <tbody>${(enrollments || []).map(e => `
                <tr>
                  <td data-th="${t2("student")}">${esc(nameOf(pById(e.student_id)))}</td>
                  <td data-th="${t2("course")}">${esc(cTitle(e.course_id))}</td>
                  <td data-th="${t2("teacher")}">${esc(nameOf(pById(e.teacher_id)))}</td>
                  <td><button class="ghost en-remove" data-id="${e.id}">${t2("remove")}</button></td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty" style="margin-top:0.75rem;">${t2("no_enrollments")}</p>`}
          </div>
        </div>

        <div class="tabpane" data-tab="reports">
          <div class="card">
            <div class="card-head"><h2>${icon("bar-chart-3", 18)} ${t2("per_course")}</h2></div>
            ${courseRows.length ? `
            <table class="stackable">
              <thead><tr><th>${t2("course")}</th><th>${t2("students")}</th>
                <th>${t2("avg_completion")}</th><th>${t2("avg_score")}</th><th>${t2("total_time")}</th></tr></thead>
              <tbody>${courseRows.map(r => `
                <tr>
                  <td data-th="${t2("course")}">${esc(r.title)}</td>
                  <td data-th="${t2("students")}">${r.enrolled}</td>
                  <td data-th="${t2("avg_completion")}">
                    <div class="progress" style="margin:0 0 2px; max-width:140px;"><span style="width:${r.compl}%;"></span></div>${r.compl}%</td>
                  <td data-th="${t2("avg_score")}">${r.score}</td>
                  <td data-th="${t2("total_time")}">${fmtTime(r.time)}</td>
                </tr>`).join("")}</tbody>
            </table>` : `<p class="empty">${t2("no_data")}</p>`}
          </div>

          <div class="card">
            <div class="card-head"><h2>${icon("graduation-cap", 18)} ${t2("per_teacher")}</h2></div>
            ${teacherRows.length ? `
            <table class="stackable">
              <thead><tr><th>${t2("teacher")}</th><th>${t2("students")}</th>
                <th>${t2("lessons_completed")}</th><th>${t2("total_time")}</th></tr></thead>
              <tbody>${teacherRows.map(r => `
                <tr>
                  <td data-th="${t2("teacher")}">${esc(r.name)}</td>
                  <td data-th="${t2("students")}">${r.students}</td>
                  <td data-th="${t2("lessons_completed")}">${r.compl}</td>
                  <td data-th="${t2("total_time")}">${fmtTime(r.time)}</td>
                </tr>`).join("")}</tbody>

      // ================= LỚP HỌC (Phase 29) =================
      // Trung tâm → Khóa được cấp phép → Lớp → Giáo viên + Học viên
      // Mọi quyền đều được cơ sở dữ liệu kiểm tra lại (migration39),
      // giao diện chỉ ẩn/hiện cho gọn.
      (function () {
        const root = document.getElementById("cls-root");
        if (!root) return;

        const D = { classes: [], members: [], courses: [], licences: [],
                    teachers: [], students: [], orgId: null };
        let loaded = false, failed = false;
        let view = { courseId: null, classId: null, editing: null, bulk: null };

        const STATUS = { upcoming: "Sắp mở", active: "Đang học",
                         completed: "Kết thúc", archived: "Lưu trữ" };
        const STATUS_PILL = { upcoming: "todo", active: "done", completed: "off", archived: "bad" };
        const nameOfId = id => {
          const p = [...D.teachers, ...D.students].find(x => x.id === id);
          return p ? (p.full_name || p.email || "—") : "—";
        };
        const courseTitle = id => (D.courses.find(c => c.id === id) || {}).title || "—";
        const clsOf = id => D.classes.find(c => c.id === id);
        const membersOf = id => D.members.filter(m => m.class_id === id);

        async function load() {
          const [cl, cs, co, li, pe, orgs] = await Promise.all([
            sb.from("classes").select("*").order("created_at"),
            sb.from("class_students").select("*"),
            sb.from("courses").select("id, title").order("sort_order"),
            sb.from("course_licenses").select("course_id, seats, expires_on"),
            sb.from("profiles").select("id, full_name, email, role, suspended").order("created_at"),
            sb.from("organizations").select("id").limit(1)
          ]);
          if (cl.error || cs.error) { failed = true; return; }
          D.classes = cl.data || []; D.members = cs.data || [];
          D.courses = co.data || []; D.licences = li.data || [];
          D.teachers = (pe.data || []).filter(p => p.role === "teacher");
          D.students = (pe.data || []).filter(p => p.role === "student");
          D.orgId = (orgs.data && orgs.data[0] && orgs.data[0].id) || null;
          loaded = true;
        }

        /* ---------- level 1: courses licensed to this centre ---------- */
        function courseList() {
          const licensed = D.licences
            .map(l => D.courses.find(c => c.id === l.course_id))
            .filter(Boolean);
          if (!licensed.length)
            return `<p class="empty">Trung tâm chưa được cấp phép khóa học nào. Liên hệ Learning Ecology để thêm khóa.</p>`;
          return licensed.map(c => {
            const cls = D.classes.filter(x => x.course_id === c.id);
            const active = cls.filter(x => x.status === "active").length;
            const learners = new Set(
              D.members.filter(m => cls.some(x => x.id === m.class_id)).map(m => m.student_id)).size;
            const tnames = [...new Set(cls.map(x => x.teacher_id).filter(Boolean))].map(nameOfId);
            return `
              <div class="card">
                <div class="card-head">
                  <h2>${esc(c.title)}</h2>
                  <button data-act="open" data-course="${c.id}">Quản lý lớp →</button>
                </div>
                <div class="stat-grid">
                  <div class="stat"><div class="k">Số lớp</div><div class="v">${cls.length}</div></div>
                  <div class="stat"><div class="k">Đang học</div><div class="v">${active}</div></div>
                  <div class="stat"><div class="k">Học viên</div><div class="v">${learners}</div></div>
                  <div class="stat"><div class="k">Giáo viên</div><div class="v">${tnames.length}</div></div>
                </div>
                ${tnames.length ? `<p style="margin:.6rem 0 0; color:var(--muted); font-size:.85rem;">
                  Giáo viên: ${tnames.map(esc).join(" · ")}</p>` : ""}
                ${cls.length ? `<p style="margin:.35rem 0 0; color:var(--muted); font-size:.85rem;">
                  ${Object.keys(STATUS).map(k => {
                    const n = cls.filter(x => x.status === k).length;
                    return n ? `${STATUS[k]}: ${n}` : "";
                  }).filter(Boolean).join(" · ")}</p>` : ""}
              </div>`;
          }).join("");
        }

        /* ---------- class create / edit form ---------- */
        function classForm(c) {
          const isNew = !c.id;
          return `
            <div class="card" style="border-color:var(--accent);">
              <div class="card-head"><h2>${isNew ? "➕ Tạo lớp mới" : "✏️ Sửa lớp"}</h2></div>
              <div class="form-row">
                <div class="field"><label>Tên lớp *</label>
                  <input id="cf-name" value="${esc(c.name || "")}" placeholder="HSK 1 – Lớp A"></div>
                <div class="field"><label>Giáo viên phụ trách</label>
                  <select id="cf-teacher"><option value="">— chưa phân công —</option>
                    ${D.teachers.map(t => `<option value="${t.id}" ${c.teacher_id === t.id ? "selected" : ""}>${esc(t.full_name || t.email)}</option>`).join("")}
                  </select></div>
                <div class="field" style="max-width:150px;"><label>Trạng thái</label>
                  <select id="cf-status">${Object.entries(STATUS).map(([k, v]) =>
                    `<option value="${k}" ${(c.status || "upcoming") === k ? "selected" : ""}>${v}</option>`).join("")}</select></div>
                <div class="field" style="max-width:140px;"><label>Bắt đầu</label>
                  <input type="date" id="cf-start" value="${esc(c.starts_on || "")}"></div>
                <div class="field" style="max-width:140px;"><label>Kết thúc</label>
                  <input type="date" id="cf-end" value="${esc(c.ends_on || "")}"></div>
                <div class="field" style="max-width:130px;"><label>Sĩ số tối đa</label>
                  <input type="number" min="1" id="cf-max" value="${c.max_students != null ? c.max_students : ""}" placeholder="không giới hạn"></div>
                <div class="field"><label>Lịch học</label>
                  <input id="cf-sched" value="${esc(c.schedule || "")}" placeholder="T2-4-6 · 18:00–19:30"></div>
              </div>
              <div class="form-row" style="margin-top:.5rem;">
                <button data-act="save-class">💾 Lưu</button>
                <button class="ghost" data-act="cancel-class">Hủy</button>
              </div>
              <p class="msg" id="cf-msg"></p>
            </div>`;
        }

        /* ---------- level 2: classes of one course ---------- */
        function classList() {
          const course = D.courses.find(c => c.id === view.courseId);
          const cls = D.classes.filter(x => x.course_id === view.courseId);
          return `
            <div class="form-row" style="margin-bottom:.6rem;">
              <button class="ghost" data-act="back">← Tất cả khóa học</button>
              <button data-act="new-class">➕ Tạo lớp</button>
            </div>
            <h2 style="margin:.2rem 0 .8rem;">${esc(course ? course.title : "")}</h2>
            ${view.editing && !view.editing.id ? classForm(view.editing) : ""}
            ${cls.length ? cls.map(c => {
              const n = membersOf(c.id).length;
              const cap = c.max_students;
              const full = cap != null && n >= cap;
              return `
              <div class="card">
                <div class="card-head">
                  <h2>${esc(c.name)} <span class="pill ${STATUS_PILL[c.status] || ""}">${STATUS[c.status]}</span></h2>
                  <div class="form-row" style="gap:.35rem;">
                    <button class="ghost" data-act="students" data-id="${c.id}">
                      👥 Học viên (${n}${cap != null ? "/" + cap : ""})</button>
                    <button class="ghost" data-act="edit-class" data-id="${c.id}">✏️</button>
                    <button class="ghost" data-act="del-class" data-id="${c.id}"
                            style="color:var(--danger); border-color:var(--danger);">🗑</button>
                  </div>
                </div>
                <p style="margin:0; color:var(--muted); font-size:.85rem;">
                  👩‍🏫 ${esc(c.teacher_id ? nameOfId(c.teacher_id) : "chưa phân công giáo viên")}
                  ${c.schedule ? " · 🗓 " + esc(c.schedule) : ""}
                  ${c.starts_on ? " · từ " + esc(c.starts_on) : ""}${c.ends_on ? " → " + esc(c.ends_on) : ""}
                  ${full ? ' · <b style="color:var(--warning);">đã đủ sĩ số</b>' : ""}
                </p>
                ${view.editing && view.editing.id === c.id ? classForm(view.editing) : ""}
                ${view.classId === c.id ? studentPanel(c) : ""}
              </div>`;
            }).join("") : `<p class="empty">Khóa này chưa có lớp nào — bấm "Tạo lớp" để bắt đầu.</p>`}`;
        }

        /* ---------- level 3: students in one class ---------- */
        function studentPanel(c) {
          const mem = membersOf(c.id);
          const memIds = new Set(mem.map(m => m.student_id));
          const free = D.students.filter(s => !memIds.has(s.id));
          const cap = c.max_students;
          const room = cap == null ? Infinity : cap - mem.length;
          return `
            <hr style="border:none; border-top:1px solid var(--line); margin:.9rem 0;">
            <div class="form-row" style="align-items:flex-end;">
              <div class="field" style="min-width:240px;"><label>Thêm học viên (giữ Ctrl/Cmd để chọn nhiều)</label>
                <select id="cs-pick" multiple size="5" style="min-height:120px;">
                  ${free.map(s => `<option value="${s.id}">${esc(s.full_name || s.email)}${s.suspended ? " (đã khoá)" : ""}</option>`).join("")
                    || `<option disabled>Tất cả học viên đã ở trong lớp này</option>`}
                </select></div>
              <button data-act="add-picked" data-id="${c.id}">➕ Thêm vào lớp</button>
              <button class="ghost" data-act="bulk" data-id="${c.id}">⬆ Nhập từ file</button>
              <span style="align-self:center; color:var(--muted); font-size:.85rem;">
                Sĩ số: <b>${mem.length}${cap != null ? " / " + cap : ""}</b>${
                  cap != null ? (room > 0 ? ` · còn ${room} chỗ` : " · đã đầy") : " · không giới hạn"}</span>
            </div>
            <p class="msg" id="cs-msg"></p>
            ${view.bulk === c.id ? bulkPanel(c) : ""}
            ${mem.length ? `
            <table class="stackable" style="margin-top:.6rem;">
              <thead><tr><th>Học viên</th><th>Email</th><th>Ngày thêm</th><th></th></tr></thead>
              <tbody>${mem.map(m => {
                const s = D.students.find(x => x.id === m.student_id) || {};
                return `<tr>
                  <td data-th="Học viên">${esc(s.full_name || "—")}</td>
                  <td data-th="Email">${esc(s.email || "—")}</td>
                  <td data-th="Ngày thêm">${(m.added_at || "").slice(0, 10)}</td>
                  <td><button class="ghost" data-act="rm-student" data-id="${c.id}" data-student="${m.student_id}"
                        style="color:var(--danger); border-color:var(--danger);">Gỡ khỏi lớp</button></td>
                </tr>`;
              }).join("")}</tbody>
            </table>` : `<p class="empty" style="margin-top:.6rem;">Lớp chưa có học viên nào.</p>`}`;
        }

        /* ---------- bulk import ---------- */
        function bulkPanel(c) {
          return `
            <div class="card" style="border-color:var(--accent); margin-top:.6rem;">
              <div class="card-head"><h2>⬆ Nhập học viên vào "${esc(c.name)}"</h2>
                <button class="ghost" data-act="bulk-close">✕</button></div>
              <p style="margin:0 0 .6rem; color:var(--muted); font-size:.85rem;">
                Tệp CSV có một cột <b>email</b> (dòng đầu là tiêu đề). Học viên phải đã có tài khoản
                trong trung tâm — hệ thống chỉ ghi danh vào lớp, không tạo tài khoản mới.</p>
              <div class="form-row">
                <button class="ghost" data-act="bulk-template">⬇ Tải mẫu CSV</button>
                <div class="field" style="max-width:280px;"><label>Tệp .csv</label>
                  <input type="file" id="cs-file" accept=".csv,.txt" style="padding:.42rem;"></div>
              </div>
              <div id="cs-preview" style="margin-top:.6rem;"></div>
            </div>`;
        }

        function paint() {
          if (failed) {
            root.innerHTML = `<p class="empty">Chạy <b>migration39_classes.sql</b> trong Supabase trước, rồi mở lại tab này.</p>`;
            return;
          }
          if (!loaded) { root.innerHTML = `<p class="empty">Đang tải…</p>`; return; }
          root.innerHTML = view.courseId ? classList() : courseList();
          refreshIcons();
        }

        /* ---------- tiny CSV reader (one column: email) ---------- */
        function readCSV(text) {
          return text.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
            .map(l => l.split(/[;,\t]/)[0].trim().replace(/^"|"$/g, ""));
        }

        async function reload() { await load(); paint(); }

        /* ---------- events ---------- */
        root.addEventListener("click", async e => {
          const b = e.target.closest("[data-act]");
          if (!b) return;
          const act = b.getAttribute("data-act");
          const id = b.getAttribute("data-id");

          if (act === "open") { view = { courseId: b.getAttribute("data-course"), classId: null, editing: null, bulk: null }; return paint(); }
          if (act === "back") { view = { courseId: null, classId: null, editing: null, bulk: null }; return paint(); }
          if (act === "new-class") { view.editing = { course_id: view.courseId }; return paint(); }
          if (act === "edit-class") { view.editing = { ...clsOf(id) }; return paint(); }
          if (act === "cancel-class") { view.editing = null; return paint(); }
          if (act === "students") { view.classId = view.classId === id ? null : id; view.bulk = null; return paint(); }
          if (act === "bulk") { view.bulk = view.bulk === id ? null : id; return paint(); }
          if (act === "bulk-close") { view.bulk = null; return paint(); }

          if (act === "bulk-template") {
            const blob = new Blob(["email\nhocvien1@example.com\nhocvien2@example.com\n"],
              { type: "text/csv;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob); a.download = "mau-nhap-hoc-vien.csv"; a.click();
            URL.revokeObjectURL(a.href);
            return;
          }

          if (act === "save-class") {
            const msg = document.getElementById("cf-msg");
            const say = (t, err) => { msg.textContent = t; msg.className = "msg" + (err ? " err" : ""); };
            const name = document.getElementById("cf-name").value.trim();
            if (!name) return say("Tên lớp không được để trống.", true);
            const maxRaw = document.getElementById("cf-max").value.trim();
            const start = document.getElementById("cf-start").value || null;
            const end = document.getElementById("cf-end").value || null;
            if (start && end && end < start) return say("Ngày kết thúc phải sau ngày bắt đầu.", true);
            const row = {
              name,
              course_id: view.editing.course_id || view.courseId,
              teacher_id: document.getElementById("cf-teacher").value || null,
              status: document.getElementById("cf-status").value,
              starts_on: start, ends_on: end,
              max_students: maxRaw === "" ? null : Math.max(1, parseInt(maxRaw, 10) || 1),
              schedule: document.getElementById("cf-sched").value.trim()
            };
            b.disabled = true;
            let error;
            if (view.editing.id) ({ error } = await sb.from("classes").update(row).eq("id", view.editing.id));
            else ({ error } = await sb.from("classes").insert({ ...row, org_id: D.orgId }));
            b.disabled = false;
            if (error) {
              return say(/duplicate|unique/i.test(error.message)
                ? "Đã có lớp trùng tên trong khóa này." : "Không lưu được: " + error.message, true);
            }
            view.editing = null;
            await reload();
            toast("✓ Đã lưu lớp");
            return;
          }

          if (act === "del-class") {
            const c = clsOf(id); if (!c) return;
            const n = membersOf(id).length;
            const ok = await confirmDialog({
              title: `Xoá lớp "${esc(c.name)}"?`, danger: true, okText: "Xoá lớp",
              body: `Lớp này đang có <b>${n}</b> học viên. Xoá lớp sẽ gỡ họ khỏi lớp và thu hồi quyền
                     học khóa này (nếu họ không còn lớp nào khác cùng khóa).<br><br>
                     <b>Tài khoản học viên và tiến độ học của họ vẫn được giữ nguyên.</b>`
            });
            if (!ok) return;
            const { error } = await sb.from("classes").delete().eq("id", id);
            if (error) return toast("Không xoá được: " + error.message, "err");
            view.classId = null;
            await reload();
            toast("🗑 Đã xoá lớp");
            return;
          }

          if (act === "add-picked") {
            const sel = document.getElementById("cs-pick");
            const ids = [...sel.selectedOptions].map(o => o.value).filter(Boolean);
            const msg = document.getElementById("cs-msg");
            if (!ids.length) { msg.textContent = "Hãy chọn ít nhất một học viên."; msg.className = "msg err"; return; }
            b.disabled = true;
            const { error } = await sb.from("class_students")
              .insert(ids.map(sid => ({ class_id: id, student_id: sid })));
            b.disabled = false;
            if (error) {
              msg.textContent = /đủ|capacity|check_violation/i.test(error.message)
                ? error.message : "Không thêm được: " + error.message;
              msg.className = "msg err"; return;
            }
            await reload();
            toast(`✓ Đã thêm ${ids.length} học viên vào lớp`);
            return;
          }

          if (act === "rm-student") {
            const sid = b.getAttribute("data-student");
            const ok = await confirmDialog({
              title: "Gỡ học viên khỏi lớp?", danger: true, okText: "Gỡ khỏi lớp",
              body: `Học viên sẽ không còn trong lớp này. Nếu đây là lớp cuối cùng của khóa,
                     họ cũng mất quyền vào bài học của khóa.<br><br>
                     Tài khoản và tiến độ đã học <b>vẫn được giữ</b>.`
            });
            if (!ok) return;
            const { error } = await sb.from("class_students").delete()
              .eq("class_id", id).eq("student_id", sid);
            if (error) return toast("Không gỡ được: " + error.message, "err");
            await reload();
            toast("Đã gỡ khỏi lớp");
            return;
          }

          if (act === "bulk-go") {
            const cid = b.getAttribute("data-id");
            const rows = JSON.parse(b.getAttribute("data-rows") || "[]");
            b.disabled = true;
            const { error } = await sb.from("class_students")
              .insert(rows.map(sid => ({ class_id: cid, student_id: sid })));
            b.disabled = false;
            const box = document.getElementById("cs-preview");
            if (error) {
              box.innerHTML = `<p class="msg err">Không nhập được: ${esc(error.message)}</p>`;
              return;
            }
            view.bulk = null;
            await reload();
            toast(`✓ Đã ghi danh ${rows.length} học viên`);
            return;
          }
        });

        /* CSV file chosen → validate and show a summary before importing */
        root.addEventListener("change", async e => {
          if (e.target.id !== "cs-file") return;
          const f = e.target.files[0]; if (!f) return;
          const cid = view.bulk;
          const box = document.getElementById("cs-preview");
          box.innerHTML = `<p style="color:var(--muted); font-size:.85rem;">Đang đọc ${esc(f.name)}…</p>`;
          let lines;
          try { lines = readCSV(await f.text()); }
          catch (err) { box.innerHTML = `<p class="msg err">Không đọc được tệp.</p>`; return; }
          if (lines.length && /email/i.test(lines[0])) lines.shift();      // drop header
          if (!lines.length) { box.innerHTML = `<p class="msg err">Tệp không có dòng nào.</p>`; return; }

          const mem = new Set(membersOf(cid).map(m => m.student_id));
          const c = clsOf(cid);
          const seen = new Set();
          const ok = [], dup = [], already = [], unknown = [];
          for (const raw of lines) {
            const email = raw.toLowerCase();
            if (!email) continue;
            if (seen.has(email)) { dup.push(raw); continue; }
            seen.add(email);
            const s = D.students.find(x => (x.email || "").toLowerCase() === email);
            if (!s) { unknown.push(raw); continue; }
            if (mem.has(s.id)) { already.push(raw); continue; }
            ok.push(s);
          }
          const cap = c.max_students;
          const room = cap == null ? Infinity : cap - mem.size;
          const over = ok.length > room ? ok.length - room : 0;

          box.innerHTML = `
            <div class="stat-grid">
              <div class="stat"><div class="k">Sẽ ghi danh</div><div class="v">${Math.min(ok.length, room === Infinity ? ok.length : room)}</div></div>
              <div class="stat"><div class="k">Đã ở trong lớp</div><div class="v">${already.length}</div></div>
              <div class="stat"><div class="k">Trùng trong tệp</div><div class="v">${dup.length}</div></div>
              <div class="stat"><div class="k">Không tìm thấy</div><div class="v">${unknown.length}</div></div>
            </div>
            ${over ? `<p class="msg err">Vượt sĩ số tối đa ${cap}: ${over} học viên cuối sẽ không được thêm. Hãy tăng sĩ số hoặc bớt danh sách.</p>` : ""}
            ${unknown.length ? `<p style="color:var(--muted); font-size:.85rem;">
              Không có tài khoản: ${unknown.slice(0, 8).map(esc).join(", ")}${unknown.length > 8 ? "…" : ""}
              — hãy tạo tài khoản cho họ ở tab Học viên trước.</p>` : ""}
            <div class="form-row" style="margin-top:.6rem;">
              <button data-act="bulk-go" data-id="${cid}"
                      data-rows='${JSON.stringify(ok.slice(0, room === Infinity ? ok.length : room).map(s => s.id))}'
                      ${ok.length && room > 0 ? "" : "disabled"}>
                ✓ Ghi danh ${Math.min(ok.length, room === Infinity ? ok.length : room)} học viên</button>
              <button class="ghost" data-act="bulk-close">Hủy</button>
            </div>`;
        });

        window.__clsInit = async function () {
          if (loaded || failed) { paint(); return; }
          paint();
          await load();
          paint();
        };
      })();
      // =============== HẾT LỚP HỌC ===============

      if (tab === "classes") window.__clsInit();


      // ================= KHÓA ĐƯỢC GIAO (Phase 30) =================
      // Giáo viên và quản trị trung tâm xem trước mọi bài học của các khóa
      // trung tâm đã được cấp phép — không cần mượn tài khoản học viên.
      //
      // CHỈ ĐỌC. Không có nút sửa/xóa ở đây, và quan trọng hơn: RLS
      // (migration40) cũng chỉ cấp quyền SELECT. Quyền sửa nội dung vẫn
      // thuộc về chủ sở hữu. Danh sách khóa do cơ sở dữ liệu lọc theo
      // giấy phép của chính trung tâm — trình duyệt không tự chọn.
      (function () {
        const root = document.getElementById("ac-root");
        if (!root) return;

        const D = { courses: [], lessons: [], licences: [] };
        let loaded = false, failed = false;
        let open = null, q = "";

        const norm = s => (s || "").toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");

        async function load() {
          // RLS trả về đúng những khóa nhân viên này được xem.
          const [co, le, li] = await Promise.all([
            sb.from("courses").select("id, title, color, icon, tier, sequential")
              .order("sort_order").order("created_at"),
            sb.from("lessons").select("id, title, kind, url, storage_path, sort_order, est_minutes, tier, course_id")
              .order("sort_order").order("created_at"),
            sb.from("course_licenses").select("course_id, seats, starts_on, expires_on")
          ]);
          if (co.error) { failed = true; return; }
          D.courses = co.data || [];
          D.lessons = le.data || [];
          D.licences = li.data || [];
          loaded = true;
        }

        const lessonsOf = cid => D.lessons.filter(l => l.course_id === cid);
        const licOf = cid => D.licences.find(l => l.course_id === cid);

        function lessonRow(l, courseTier) {
          const prem = (l.tier || courseTier) === "premium";
          const how = l.storage_path ? "tệp tải lên" : (l.url ? "liên kết" : "chưa có nội dung");
          const canOpen = !!(l.url || l.storage_path);
          return `
            <div class="lesson">
              <div>
                <b>${esc(l.title)}</b>
                ${prem ? `<span class="pill todo" style="flex:none;">👑</span>` : ""}
                <span class="kind">#${l.sort_order ?? 0} · ${esc(l.kind || "")} · ${how}${
                  l.est_minutes ? " · ~" + l.est_minutes + " phút" : ""}</span>
              </div>
              ${canOpen
                ? `<button class="ghost ac-open" data-id="${l.id}">Mở xem ↗</button>`
                : `<span style="color:var(--muted); font-size:.85rem;">—</span>`}
            </div>`;
        }

        function paint() {
          if (failed) {
            root.innerHTML = `<div class="card"><p class="empty">
              Chưa chạy <b>migration40_staff_lessons.sql</b>. Chạy migration đó trong SQL Editor rồi mở lại tab này.
            </p></div>`;
            return;
          }
          if (!loaded) { root.innerHTML = `<p class="empty">Đang tải…</p>`; return; }
          if (!D.courses.length) {
            root.innerHTML = `<div class="card"><p class="empty">
              Trung tâm chưa được cấp phép khóa học nào, hoặc giấy phép đã hết hạn.
              Liên hệ Learning Ecology để được cấp khóa.</p></div>`;
            return;
          }

          const nq = norm(q);
          const hits = cid => nq
            ? lessonsOf(cid).filter(l => norm(l.title).includes(nq))
            : lessonsOf(cid);

          root.innerHTML = `
            <div class="card">
              <div class="card-head"><h2>📚 Khóa được giao cho trung tâm</h2></div>
              <p style="margin:0 0 .7rem; color:var(--muted); font-size:.85rem;">
                Toàn bộ bài học của những khóa trung tâm bạn đã được cấp phép — mở xem trực tiếp
                bằng tài khoản của mình, không cần đăng nhập bằng tài khoản học viên, và không phụ thuộc
                vào việc học viên đã ghi danh hay đã mở khóa bài trước đó hay chưa.
                Đây là chế độ <b>chỉ xem</b>: nội dung bài học do Learning Ecology biên soạn và quản lý.</p>
              <div class="form-row">
                <div class="field" style="min-width:240px;"><label>Tìm bài học</label>
                  <input id="ac-q" value="${esc(q)}" placeholder="gõ tên bài…"></div>
                ${q ? `<button class="ghost" data-act="ac-clear">✕ Xóa tìm</button>` : ""}
              </div>
            </div>
            ${D.courses.map(c => {
              const all = lessonsOf(c.id), found = hits(c.id);
              if (nq && !found.length) return "";
              const lic = licOf(c.id);
              const expanded = open === c.id || !!nq;
              return `
              <div class="card">
                <div class="card-head">
                  <h2>${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}
                    ${c.tier === "premium" ? `<span class="pill todo">👑</span>` : ""}
                    ${c.sequential ? `<span class="pill off">học tuần tự</span>` : ""}</h2>
                  <button class="ghost" data-act="ac-toggle" data-id="${c.id}">
                    ${expanded ? "▾" : "▸"} ${all.length} bài học</button>
                </div>
                <p style="margin:0; color:var(--muted); font-size:.85rem;">
                  ${nq ? `Khớp ${found.length}/${all.length} bài · ` : ""}${
                    lic && lic.expires_on ? "Giấy phép đến " + esc(lic.expires_on)
                                          : "Giấy phép không giới hạn thời gian"}</p>
                ${expanded ? (found.length
                  ? `<div style="margin-top:.6rem;">${found.map(l => lessonRow(l, c.tier)).join("")}</div>`
                  : `<p class="empty" style="margin-top:.6rem;">Khóa này chưa có bài học nào.</p>`) : ""}
              </div>`;
            }).join("") || `<div class="card"><p class="empty">Không có bài học nào khớp "${esc(q)}".</p></div>`}`;
          refreshIcons();
          const box = document.getElementById("ac-q");
          if (box && q) { box.focus(); box.setSelectionRange(q.length, q.length); }
        }

        root.addEventListener("click", async e => {
          const b = e.target.closest("[data-act], .ac-open");
          if (!b) return;

          if (b.classList.contains("ac-open")) {
            const l = D.lessons.find(x => x.id === b.getAttribute("data-id"));
            if (!l) return;
            if (l.url && !l.storage_path) {
              window.open(l.url, "_blank", "noopener");
              return;
            }
            // Tệp tải lên: mở tab TRƯỚC rồi mới lấy link ký, nếu không
            // trình duyệt sẽ chặn cửa sổ bật lên (vì mở sau lời gọi mạng).
            const w = window.open("", "_blank");
            const { data, error } = await sb.storage.from("materials")
              .createSignedUrl(l.storage_path, 3600);
            if (error || !data) {
              if (w) w.close();
              toast("Không mở được tệp: " + ((error && error.message) || "không rõ lỗi"), "err");
              return;
            }
            if (w) w.location = data.signedUrl;
            else window.open(data.signedUrl, "_blank", "noopener");
            return;
          }

          const act = b.getAttribute("data-act");
          if (act === "ac-toggle") {
            const id = b.getAttribute("data-id");
            open = open === id ? null : id;
            return paint();
          }
          if (act === "ac-clear") { q = ""; return paint(); }
        });

        root.addEventListener("input", e => {
          if (e.target.id !== "ac-q") return;
          q = e.target.value;
          paint();
        });

        window.__acInit = async function () {
          if (loaded || failed) { paint(); return; }
          paint();
          await load();
          paint();
        };
      })();
      // =============== HẾT KHÓA ĐƯỢC GIAO ===============

      if (tab === "assigned") window.__acInit();

      refreshIcons();
    }

    start();
  </script>
  <script>
    // PWA: offline shell + installability (needs HTTPS, e.g. GitHub Pages)
    if ("serviceWorker" in navigator && location.protocol === "https:")
      navigator.serviceWorker.register("sw.js");
  </script>
</body>
