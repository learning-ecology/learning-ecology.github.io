<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khóa học — Learning Ecology</title>
  <meta name="description" content="Xem toàn bộ nội dung khóa học và học thử các bài miễn phí — Learning Ecology." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Khóa học — Learning Ecology" />
  <meta property="og:image" content="https://learningecology.io.vn/social-card.png?v=2" />

  <link rel="stylesheet" href="styles.css" />
  <script>
    try { var __t = localStorage.getItem("hub_theme");
      if (__t === "dark" || (!__t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  </script>
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <meta name="theme-color" content="#17263e" />

  <style>
    body { overflow-x: hidden; }
    /* header (mirrors the landing page so branding stays consistent) */
    .lp-header {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem clamp(1rem, 4vw, 2.5rem);
      background: var(--lp-header-bg, rgba(23,38,62,0.94));
      backdrop-filter: blur(6px); color: var(--lp-header-text, #fff);
    }
    .lp-header img { width: 34px; height: 34px; border-radius: 8px; object-fit: contain; }
    .lp-header .name { font-family: var(--serif); font-size: 1.15rem; font-weight: 700; }
    .lp-header .spacer { flex: 1 1 auto; }
    .lp-header .btn.ghost, .lp-header #cp-theme {
      color: var(--lp-header-text, #fff);
      border-color: color-mix(in srgb, var(--lp-header-text, #fff) 45%, transparent);
      text-decoration: none;
    }
    .lp-header .btn:not(.ghost) {
      background: var(--lp-btn, var(--accent)); border-color: var(--lp-btn, var(--accent));
      color: var(--lp-btn-text, #fff); text-decoration: none;
    }
    .lp-header .btn:not(.ghost):hover { background: var(--lp-btn-hover, var(--accent-ink)); }

    /* shell: collapsible course sidebar + content */
    .cp-shell { display: flex; align-items: flex-start; max-width: 1180px; margin: 0 auto; }
    .cp-side {
      width: 252px; flex: none; align-self: stretch;
      border-right: 1px solid var(--line); background: var(--card);
      position: sticky; top: 56px; max-height: calc(100vh - 56px); overflow-y: auto;
      padding: 0.8rem 0.55rem;
    }
    .cp-side.collapsed { width: 74px; }
    .cp-side-head { display: flex; align-items: center; justify-content: space-between; gap: .4rem; margin: 0 .3rem .55rem; }
    .cp-side-head h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0; }
    .cp-side.collapsed .cp-side-head h3, .cp-side.collapsed .ci-title { display: none; }
    .cp-side-toggle { background: none; border: 1px solid var(--line); color: var(--muted);
      border-radius: 8px; width: 30px; height: 28px; flex: none; cursor: pointer; padding: 0; font-size: .9rem; }
    .ci { display: flex; align-items: center; gap: .6rem; width: 100%; text-align: left;
      background: none; border: 1px solid transparent; border-radius: 10px; padding: .4rem .45rem;
      cursor: pointer; color: inherit; margin-bottom: .15rem; font: inherit; }
    .ci:hover { background: var(--info-bg); }
    .ci.on { background: var(--info-bg); border-color: var(--accent); }
    .ci-thumb { width: 46px; height: 34px; flex: none; border-radius: 6px;
      background-size: cover; background-position: center; display: grid; place-items: center;
      color: #fff; font-size: 1.05rem; text-shadow: 0 1px 4px rgba(0,0,0,.4); }
    .ci-title { font-size: .85rem; font-weight: 600; line-height: 1.25; min-width: 0;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .cp-content { flex: 1 1 auto; min-width: 0; padding: clamp(1rem,4vw,1.8rem) clamp(1rem,4vw,1.8rem) 2.5rem; }
    .cp-content .course-banner { margin: 0 0 1rem; border-radius: 14px; }
    .cp-desc { color: var(--muted); margin: 0 0 1.2rem; max-width: 72ch; }
    .cp-note { color: var(--muted); font-size: .92rem; margin: 0 0 1.1rem; }
    .cp-mobilesel { display: none; width: 100%; margin-bottom: 1rem; }

    /* free/premium badge inside the reused .lc-foot */
    .cp-badge { font-size: .72rem; font-weight: 800; padding: .16rem .5rem; border-radius: 999px; }
    .cp-badge.free { background: var(--success-bg); color: var(--success); }
    .cp-badge.prem { background: rgba(183,130,63,0.16); color: var(--gold); }

    .cp-unlock { margin-top: 1.6rem; background: linear-gradient(135deg, rgba(30,79,143,.06), rgba(183,130,63,.08));
      border: 1px solid var(--line); border-radius: 16px; padding: 1.3rem; text-align: center; }
    .cp-unlock h3 { margin: 0 0 .4rem; font-family: var(--serif); }
    .cp-unlock p { margin: 0 0 .9rem; color: var(--muted); }
    .cp-unlock .btn { text-decoration: none; margin: 0 .3rem .3rem 0; }

    /* locked-lesson dialog */
    .cp-ov { position: fixed; inset: 0; background: rgba(15,23,37,.55); display: none;
      align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .cp-ov.on { display: flex; }
    .cp-modal { background: var(--card); border-radius: 16px; max-width: 420px; width: 100%;
      padding: 1.4rem; box-shadow: var(--shadow-pop); text-align: center; }
    .cp-modal .lk { font-size: 2rem; }
    .cp-modal h3 { margin: .3rem 0 .4rem; font-family: var(--serif); }
    .cp-modal p { color: var(--muted); margin: 0 0 1rem; }
    .cp-modal .btn { text-decoration: none; margin: 0 .3rem .3rem 0; }
    .cp-foot { text-align: center; color: var(--muted); font-size: .85rem; padding: 1.5rem 1rem 2.4rem; }
    .cp-foot a { color: var(--accent-ink); }

    @media (max-width: 820px) {
      .cp-side { display: none; }
      .cp-mobilesel { display: block; }
    }
  </style>
</head>
<body>
  <header class="lp-header">
    <img id="cpLogo" src="icons/icon-192.png" alt="Learning Ecology" />
    <span class="name" id="cpName">Learning Ecology</span>
    <span class="spacer"></span>
    <a class="btn ghost" href="index.html" style="margin-right:.4rem;">← Trang chủ</a>
    <button id="cp-theme" class="ghost theme-btn" aria-label="Sáng / tối" style="margin-right:.4rem;">🌙</button>
    <a id="cp-login" class="btn" href="login.html">Vào học ngay →</a>
  </header>

  <div class="cp-shell">
    <aside class="cp-side" id="cpSide" aria-label="Danh sách khóa học">
      <div class="cp-side-head">
        <h3>Khóa học</h3>
        <button class="cp-side-toggle" id="cpSideToggle" aria-label="Thu gọn / mở rộng">⟨</button>
      </div>
      <div id="cpSideList"></div>
    </aside>

    <div class="cp-content">
      <select class="cp-mobilesel" id="cpMobileSel" aria-label="Chọn khóa học"></select>
      <div id="cpMain"><p class="cp-note">Đang tải nội dung khóa học…</p></div>
    </div>
  </div>

  <div class="cp-foot">
    © <span id="cpYear"></span> <span id="cpFootName">Learning Ecology</span> ·
    <a href="index.html">Trang chủ</a>
  </div>

  <div class="cp-ov" id="cpOverlay" role="dialog" aria-modal="true" aria-labelledby="cpMTitle">
    <div class="cp-modal">
      <div class="lk">🔒</div>
      <h3 id="cpMTitle">Bài học Premium</h3>
      <p>Liên hệ để mở khóa toàn bộ khóa học và học không giới hạn.</p>
      <div id="cpMBtns"></div>
      <button class="ghost" data-cpclose style="margin-top:.4rem;">Đóng</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    function esc(s){ return String(s==null?"":s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function safeColor(v){ v=String(v==null?"":v).trim();
      return /^#[0-9a-fA-F]{3,8}$/.test(v) || /^rgba?\(\s*[\d.\s,%/]+\)$/i.test(v)
          || /^hsla?\(\s*[\d.\s,%/deg]+\)$/i.test(v) ? v : ""; }
    function iconFor(k){ return ({ html:"🌐", link:"🔗", pdf:"📄", video:"🎬", audio:"🎧",
      quiz:"📝", image:"🖼️", word:"📃", excel:"📊", powerpoint:"📽️", text:"📄" })[String(k||"").toLowerCase()] || "📄"; }
    const CONTACT_FALLBACK = "https://zalo.me/0961923983";
    let CONTACT = CONTACT_FALLBACK;
    let COURSES = [], currentId = null;

    $("cp-theme").addEventListener("click", () => {
      const root = document.documentElement;
      const dark = root.getAttribute("data-theme") === "dark";
      root.setAttribute("data-theme", dark ? "light" : "dark");
      try { localStorage.setItem("hub_theme", dark ? "light" : "dark"); } catch (e) {}
    });

    /* apply the owner's brand — same model as index.html */
    function applyBrand(cfg){
      const B = cfg.brand || {};
      if (B.logo_url) $("cpLogo").src = B.logo_url;
      if (B.site_name){ $("cpName").textContent = B.site_name; $("cpFootName").textContent = B.site_name; $("cpLogo").alt = B.site_name; }
      const c = B.colors || {}, light = [], dark = [], both = [];
      const put=(k,v,arr)=>{ const val=safeColor(c[k]); if(val) arr.push(v+":"+val); };
      [["bg","--paper"],["card","--card"],["heading","--ink"],["body","--muted"]].forEach(([k,v])=>put(k,v,light));
      [["primary","--accent"],["secondary","--accent-ink"],["accent","--gold"]].forEach(([k,v])=>{put(k,v,light);put(k,v,dark);});
      [["btn","--lp-btn"],["btn_hover","--lp-btn-hover"],["btn_text","--lp-btn-text"],
       ["header_bg","--lp-header-bg"],["header_text","--lp-header-text"]].forEach(([k,v])=>put(k,v,both));
      const css = ((light.length||both.length)?`:root{${light.concat(both).join(";")}}`:"")
                + ((dark.length||both.length)?`:root[data-theme="dark"]{${dark.concat(both).join(";")}}`:"");
      if (css){ const st=document.createElement("style"); st.textContent=css; document.head.appendChild(st); }
    }

    /* ---- contact modal ---- */
    function contactButtons(){
      const zalo = /zalo\.me/i.test(CONTACT);
      return `<a class="btn" href="${esc(CONTACT)}" target="_blank" rel="noopener">${zalo ? "💬 Liên hệ ngay" : "Liên hệ ngay"}</a>`
           + `<a class="btn ghost" href="index.html#lien-he">Xem thông tin liên hệ</a>`;
    }
    function showLocked(){ $("cpMBtns").innerHTML = contactButtons(); $("cpOverlay").classList.add("on"); }
    $("cpOverlay").addEventListener("click", e => {
      if (e.target.id === "cpOverlay" || e.target.hasAttribute("data-cpclose")) $("cpOverlay").classList.remove("on");
    });
    document.addEventListener("keydown", e => { if (e.key === "Escape") $("cpOverlay").classList.remove("on"); });

    /* ---- open a FREE lesson (link or signed URL) ---- */
    async function openLesson(l){
      if (l.url){ window.open(l.url, "_blank", "noopener"); return; }
      if (l.storage_path){
        const w = window.open("", "_blank");
        const { data, error } = await sb.storage.from("materials").createSignedUrl(l.storage_path, 3600);
        if (error || !data){ if (w) w.close(); alert("Không mở được bài học này. Vui lòng thử lại sau."); return; }
        if (w) w.location = data.signedUrl; else window.open(data.signedUrl, "_blank", "noopener");
      }
    }

    /* ---- sidebar ---- */
    function thumbStyle(banner, color){
      return banner ? `background-image:url('${esc(banner)}');`
        : `background:linear-gradient(120deg, ${esc(color||"#1e4f8f")}, ${esc(color||"#1e4f8f")}b3);`;
    }
    function renderSidebar(){
      $("cpSideList").innerHTML = COURSES.map(c => `
        <button class="ci" data-cid="${esc(c.id)}" title="${esc(c.title)}">
          <span class="ci-thumb" style="${thumbStyle(c.banner_url, c.color)}">${c.banner_url ? "" : esc(c.icon || "📚")}</span>
          <span class="ci-title">${esc(c.title)}</span>
        </button>`).join("");
      $("cpMobileSel").innerHTML = COURSES.map(c => `<option value="${esc(c.id)}">${esc(c.title)}</option>`).join("");
    }
    function markCurrent(id){
      $("cpSideList").querySelectorAll(".ci").forEach(b =>
        b.classList.toggle("on", b.getAttribute("data-cid") === id));
      const sel = $("cpMobileSel"); if (sel && sel.value !== id) sel.value = id;
    }
    // collapse toggle (remembered)
    try { if (localStorage.getItem("cp_side") === "collapsed") $("cpSide").classList.add("collapsed"); } catch(e){}
    $("cpSideToggle").addEventListener("click", () => {
      const col = $("cpSide").classList.toggle("collapsed");
      $("cpSideToggle").textContent = col ? "⟩" : "⟨";
      try { localStorage.setItem("cp_side", col ? "collapsed" : "open"); } catch(e){}
    });
    if ($("cpSide").classList.contains("collapsed")) $("cpSideToggle").textContent = "⟩";
    $("cpSideList").addEventListener("click", e => {
      const b = e.target.closest(".ci"); if (b) switchCourse(b.getAttribute("data-cid"), true);
    });
    $("cpMobileSel").addEventListener("change", e => switchCourse(e.target.value, true));
    window.addEventListener("popstate", () => {
      const id = new URLSearchParams(location.search).get("id");
      if (id && id !== currentId) switchCourse(id, false);
    });

    /* ---- render one course (banner + visual lesson grid) ---- */
    function banner(c, lessons){
      const free = lessons.filter(l => !l.premium).length, prem = lessons.length - free;
      return `
        <div class="course-banner">
          <div class="cb-bg" style="${thumbStyle(c.banner_url, c.color)}">${c.banner_url ? "" : esc(c.icon || "📚")}</div>
          <div class="cb-shade"></div>
          ${c.category ? `<span class="cb-tag">${esc(c.category)}</span>` : ""}
          ${c.tier === "premium" ? `<span class="cb-prem">👑 Premium</span>` : ""}
          <div class="cb-info">
            <div class="cb-title">${c.icon ? esc(c.icon) + " " : ""}${esc(c.title)}</div>
            <div class="cb-stats">
              <span>📚 ${lessons.length} bài học</span>
              <span>🔓 ${free} học thử miễn phí</span>
              ${prem ? `<span>👑 ${prem} Premium</span>` : ""}
            </div>
          </div>
        </div>
        ${c.description ? `<p class="cp-desc">${esc(c.description)}</p>` : ""}`;
    }
    function lessonCard(l, n){
      const prem = !!l.premium;
      const kind = String(l.kind || "file").toLowerCase();
      const foot = prem
        ? `<span class="cp-badge prem">👑 Premium</span><button class="ghost prem-btn lc-prem-btn" data-lock>🔒 Mở khóa</button>`
        : (l.url || l.storage_path)
          ? `<span class="cp-badge free">Miễn phí</span><button class="btn" data-open='${esc(JSON.stringify({ url: l.url || "", storage_path: l.storage_path || "" }))}'>Học thử miễn phí</button>`
          : `<span class="cp-badge free">Miễn phí</span><span class="pill">sắp có</span>`;
      return `
        <div class="lcard ${prem ? "prem" : ""}">
          <div class="lc-thumb lk-${esc(kind)}"${l.image_url ? ` style="background-image:url('${esc(l.image_url)}');"` : ""}>
            ${l.image_url ? "" : iconFor(kind)}
            <span class="lc-num">${n}</span>
            ${prem ? `<span class="lc-state s-lock">🔒</span>` : ""}
          </div>
          <div class="lc-body">
            <div class="lc-title">${esc(l.title)}</div>
            <span class="lc-kind">${esc(l.kind || "")}${l.est_minutes ? " · ~" + l.est_minutes + " phút" : ""}</span>
          </div>
          <div class="lc-foot">${foot}</div>
        </div>`;
    }
    function renderCourse(data){
      const c = data.course, lessons = data.lessons || [];
      document.title = c.title + " — Learning Ecology";
      $("cpMain").innerHTML =
        banner(c, lessons)
        + `<p class="cp-note">Bấm một bài <b>miễn phí</b> để học thử ngay — không cần đăng nhập. Bài <b>Premium</b> cần liên hệ để mở khóa.</p>`
        + (lessons.length
            ? `<div class="lesson-grid">${lessons.map((l, i) => lessonCard(l, i + 1)).join("")}</div>`
            : `<p class="cp-note">Khóa học này chưa có bài nào được đăng.</p>`)
        + `<div class="cp-unlock"><h3>👑 Mở khóa toàn bộ khóa học</h3>
             <p>Liên hệ để mở khóa toàn bộ khóa học và học không giới hạn tất cả bài Premium.</p>
             <div>${contactButtons()}</div></div>`;
      $("cpMain").querySelectorAll("[data-open]").forEach(b =>
        b.addEventListener("click", () => openLesson(JSON.parse(b.getAttribute("data-open")))));
      $("cpMain").querySelectorAll("[data-lock]").forEach(b => b.addEventListener("click", showLocked));
    }
    function notFoundHtml(){
      return `<p class="cp-note">Khóa học không tồn tại hoặc chưa được công khai.</p>
        ${COURSES.length ? `<p class="cp-note">Chọn một khóa khác ở thanh bên.</p>`
          : `<div class="cp-unlock"><h3>Khám phá các khóa học</h3>
               <p>Quay lại trang chủ để xem toàn bộ khóa học đang mở.</p>
               <div><a class="btn" href="index.html">← Về trang chủ</a></div></div>`}`;
    }

    async function switchCourse(id, push){
      if (!id) return;
      currentId = id;
      markCurrent(id);
      if (push){ try { history.pushState({ id }, "", "course.html?id=" + encodeURIComponent(id)); } catch(e){} }
      $("cpMain").innerHTML = `<p class="cp-note">Đang tải…</p>`;
      const res = await sb.rpc("public_course", { p_course: id }).then(r => r, () => ({ data: null }));
      const data = res && res.data;
      if (!data || !data.course){ document.title = "Khóa học — Learning Ecology"; $("cpMain").innerHTML = notFoundHtml(); return; }
      renderCourse(data);
    }

    async function boot(){
      $("cpYear").textContent = new Date().getFullYear();
      const id = new URLSearchParams(location.search).get("id");
      const [setRes, listRes] = await Promise.all([
        sb.from("landing_settings").select("config").eq("id", 1).maybeSingle().then(r => r, () => ({ data: null })),
        sb.rpc("public_courses").then(r => r, () => ({ data: null }))
      ]);
      const cfg = (setRes && setRes.data && setRes.data.config) || {};
      applyBrand(cfg);
      const cUrl = cfg.trial && cfg.trial.s_url;
      if (cUrl && /^https?:\/\//i.test(cUrl)) CONTACT = cUrl;
      sb.auth.getSession().then(({ data }) => {
        const el = $("cp-login");
        if (data && data.session) { el.textContent = "Vào học ngay →"; el.href = "dashboard.html"; }
        else el.textContent = "Đăng nhập";
      }).catch(() => {});

      COURSES = (listRes && Array.isArray(listRes.data)) ? listRes.data : [];
      if (!COURSES.length && !id){
        $("cpSide").style.display = "none";
        $("cpMain").innerHTML = notFoundHtml();
        return;
      }
      renderSidebar();
      // pick the course: the requested id if public, else the first public course
      const start = (id && COURSES.some(c => c.id === id)) ? id : (id || (COURSES[0] && COURSES[0].id));
      if (id && id === start && !new URLSearchParams(location.search).get("id")) { /* noop */ }
      switchCourse(start, false);
      // normalise the URL so it always names the shown course
      if (start && start !== id) { try { history.replaceState({ id: start }, "", "course.html?id=" + encodeURIComponent(start)); } catch(e){} }
    }
    boot();
  </script>
</body>
</html>
