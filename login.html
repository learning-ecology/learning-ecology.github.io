<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Learning Ecology</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    /* apply dark mode before first paint: saved choice, else device preference */
    try { var __t = localStorage.getItem("hub_theme");
      if (__t === "dark" || (!__t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.setAttribute("data-theme", "dark");
    } catch (e) {}
  </script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#17263e" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Learning Ecology" />
</head>
<body>
  <main class="login-wrap">
    <div style="width:100%; max-width:380px;">
      <div style="text-align:center; margin-bottom:1.1rem;">
        <a href="index.html"><img src="icons/icon-192.png" alt="Learning Ecology" width="60" height="60"
             style="border-radius:14px; box-shadow:0 10px 26px -10px rgba(0,0,0,0.55);" /></a>
        <div style="color:#fff; font-family:var(--serif); font-size:1.35rem; font-weight:700; margin-top:0.55rem; text-shadow:0 2px 8px rgba(0,0,0,0.35);">Learning Ecology</div>
      </div>
    <div class="login-card">
      <h1 data-i18n="signin_title">Sign in</h1>
      <p data-i18n="signin_sub" style="color:var(--muted); margin:0 0 1.5rem; font-size:0.9rem;">
        Use the email and password your teacher gave you.
      </p>

      <div class="field">
        <label for="email" data-i18n="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password" data-i18n="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="signin" data-i18n="signin_btn" style="width:100%;">Sign in</button>
      <p style="text-align:center; margin:0.9rem 0 0;">
        <a href="#" id="forgot" data-i18n="forgot" style="font-size:0.85rem;">Forgot password?</a>
      </p>
      <p id="msg" class="msg"></p>
      <p style="text-align:center; margin:1.1rem 0 0; border-top:1px solid var(--line); padding-top:0.9rem;">
        <a href="#" id="lang-toggle" style="font-size:0.85rem; color:var(--muted);"></a>
      </p>
    </div>
    <div id="pwa-banner" class="login-card" style="display:none; margin-top:0.9rem; padding:1.1rem 1.3rem;"></div>
      <p style="text-align:center; margin-top:1rem;">
        <a href="index.html" style="color:rgba(255,255,255,0.85); font-size:0.85rem;">← Learning Ecology</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script>
    applyI18n();
    const langLink = document.getElementById("lang-toggle");
    langLink.textContent = t("lang_name");
    langLink.addEventListener("click", (e) => { e.preventDefault(); setLang(otherLang()); });

    const msg = document.getElementById("msg");

    // Arrived here because the account was signed in on another device?
    if (new URLSearchParams(location.search).get("kicked")) {
      msg.textContent = t("msg_kicked");
      msg.className = "msg err";
    }

    // If already logged in, skip straight to the dashboard.
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = "dashboard.html";
    });

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      msg.textContent = "";
      msg.className = "msg";

      if (!email || !password) {
        msg.textContent = t("msg_enter_both");
        msg.className = "msg err";
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = t("msg_bad_login");
        msg.className = "msg err";
        return;
      }

      // One device per account: mark THIS device as the active one
      // and revoke every other device's session.
      try {
        const device = crypto.randomUUID();
        localStorage.setItem("hub_device", device);
        const { data: { user } } = await sb.auth.getUser();
        await sb.from("profiles").update({ active_session: device }).eq("id", user.id);
        await sb.auth.signOut({ scope: "others" });
        // login history
        const ua = navigator.userAgent;
        const dtp = /iPad|Tablet/i.test(ua) ? "tablet"
          : (/Mobi|iPhone|Android.*Mobile/i.test(ua) ? "mobile" : "desktop");
        const os = /Windows/i.test(ua) ? "Windows" : /Mac OS X/i.test(ua) ? "macOS"
          : /Android/i.test(ua) ? "Android" : /iPhone|iPad/i.test(ua) ? "iOS" : "other";
        const br = /Edg\//.test(ua) ? "Edge" : /Chrome\//.test(ua) ? "Chrome"
          : /Firefox\//.test(ua) ? "Firefox" : /Safari\//.test(ua) ? "Safari" : "other";
        await sb.from("access_events").insert({
          student_id: user.id, event: "login",
          device, device_type: dtp, agent: os + " · " + br
        });
      } catch (e) { /* non-fatal: login still proceeds */ }

      window.location.href = "dashboard.html";
    }

    document.getElementById("signin").addEventListener("click", signIn);

    document.getElementById("forgot").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      msg.className = "msg";
      if (!email) {
        msg.textContent = t("msg_type_email_first");
        msg.className = "msg err";
        return;
      }
      // Send a reset link that lands on reset.html of THIS site.
      const redirectTo = new URL("reset.html", window.location.href).href;
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
      msg.textContent = error ? t("msg_reset_fail") : t("msg_reset_sent");
      if (error) msg.className = "msg err";
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") signIn();
    });

    // ---- "install as an app" hint ----
    // Android/Chrome: real install button (native prompt).
    // iPhone/iPad: Safari has no prompt, so show tap-by-tap directions.
    // Hidden once installed, or after the student dismisses it.
    (function () {
      const box = document.getElementById("pwa-banner");
      const standalone = window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone;
      let hidden = false;
      try { hidden = localStorage.getItem("hub_pwa_hint") === "no"; } catch (e) {}
      if (!box || standalone || hidden) return;

      const show = (inner) => {
        box.innerHTML = `
          <div style="display:flex; gap:0.7rem; align-items:flex-start;">
            <img src="icons/icon-192.png" alt="" width="42" height="42" style="border-radius:10px; flex:none;" />
            <div style="flex:1; min-width:0;">
              <div style="font-weight:700; margin-bottom:0.25rem;">${t("pwa_title")}</div>
              ${inner}
            </div>
          </div>
          <p style="text-align:right; margin:0.6rem 0 0;">
            <a href="#" id="pwa-no" style="font-size:0.82rem; color:var(--muted);">${t("pwa_dismiss")}</a>
          </p>`;
        box.style.display = "block";
        document.getElementById("pwa-no").addEventListener("click", (e) => {
          e.preventDefault();
          try { localStorage.setItem("hub_pwa_hint", "no"); } catch (e2) {}
          box.style.display = "none";
        });
      };

      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      if (isIOS) {
        show(`<p style="margin:0; font-size:0.86rem; color:var(--muted);">${t("pwa_ios")}</p>`);
      } else {
        let deferred = null;
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          deferred = e;
          show(`<button id="pwa-go" style="width:auto;">${t("pwa_install")}</button>`);
          document.getElementById("pwa-go").addEventListener("click", () => {
            box.style.display = "none";
            if (deferred) deferred.prompt();
          });
        });
      }
    })();
  </script>
  <script>
    // PWA: offline shell + installability (needs HTTPS, e.g. GitHub Pages)
    if ("serviceWorker" in navigator && location.protocol === "https:")
      navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
