<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher — Thong's Learning Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">Thong's Learning Hub · Teacher</span>
    <div style="display:flex; align-items:center;">
      <span class="who" id="who"></span>
      <button class="ghost" id="signout">Sign out</button>
    </div>
  </header>

  <main class="container" id="app">
    <p class="empty">Loading…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const app = document.getElementById("app");
    const who = document.getElementById("who");
    let user = null, myOrg = null;

    document.getElementById("signout").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "index.html";
    });

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }
    const fmtTime = s => !s ? "—" : (s < 60 ? "<1 min" : Math.round(s / 60) + " min");
    const nameOf = p => p?.full_name || p?.email || "—";

    async function createUser(payload) {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(SUPABASE_URL + "/functions/v1/manage-user", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                   Authorization: "Bearer " + session.access_token,
                   apikey: SUPABASE_ANON_KEY },
        body: JSON.stringify(payload)
      });
      const out = await res.json();
      if (!res.ok) throw new Error(out.error || "Request failed");
      return out;
    }

    async function start() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      user = session.user;
      const { data: me } = await sb.from("profiles")
        .select("full_name, role, org_id").eq("id", user.id).single();
      if (me?.role !== "teacher") { window.location.href = "dashboard.html"; return; }
      myOrg = me.org_id;
      who.textContent = me.full_name || user.email;
      render();
    }

    async function render() {
      // Everything below is already filtered by the database (RLS):
      // a teacher only ever receives their own courses and students.
      const [{ data: courses }, { data: lessons }, { data: enrollments },
             { data: students }, { data: prog }, { data: activity },
             { data: licenses }, { data: anns }] = await Promise.all([
        sb.from("courses").select("*").order("sort_order").order("created_at"),
        sb.from("lessons").select("id, title, course_id, kind").order("sort_order"),
        sb.from("enrollments").select("id, student_id, course_id, created_at")
          .eq("teacher_id", user.id).order("created_at"),
        sb.from("profiles").select("id, full_name, email, avatar_url, access_expires, suspended")
          .eq("role", "student").order("created_at"),
        sb.from("progress").select("student_id, lesson_id, status, updated_at"),
        sb.from("lesson_activity").select("student_id, lesson_id, kind, key, value, max_value, updated_at"),
        sb.from("course_licenses").select("course_id, seats, expires_on"),
        sb.from("announcements").select("*").eq("author_id", user.id)
          .order("created_at", { ascending: false })
      ]);

      const cTitle = id => (courses || []).find(c => c.id === id)?.title || "—";
      const lById = id => (lessons || []).find(l => l.id === id);
      const sById = id => (students || []).find(s => s.id === id);
      const seatUse = cid => (enrollments || []).filter(e => e.course_id === cid).length;
      const licOf = cid => (licenses || []).find(l => l.course_id === cid);

      // time per student
      const timeBy = {};
      (activity || []).forEach(a => {
        if (a.kind === "time" && a.key === "total")
          timeBy[a.student_id] = (timeBy[a.student_id] || 0) + (Number(a.value) || 0);
      });
      const doneBy = {};
      (prog || []).forEach(p => {
        if (p.status === "completed") doneBy[p.student_id] = (doneBy[p.student_id] || 0) + 1;
      });
      const lastBy = {};
      [...(prog || []), ...(activity || [])].forEach(r => {
        if (r.updated_at && (!lastBy[r.student_id] || r.updated_at > lastBy[r.student_id]))
          lastBy[r.student_id] = r.updated_at;
      });

      const myStudents = (students || []).filter(s =>
        (enrollments || []).some(e => e.student_id === s.id));
      const courseOptions = (courses || []).map(c =>
        `<option value="${c.id}">${esc(c.title)}</option>`).join("");
      const studentOptions = (students || []).map(s =>
        `<option value="${s.id}">${esc(nameOf(s))}</option>`).join("");

      const stat = (k, v, sub) =>
        `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;

      const courseCards = (courses || []).map(c => {
        const lic = licOf(c.id);
        const used = seatUse(c.id);
        return `
        <div class="lesson">
          <span style="width:14px;height:14px;border-radius:50%;background:${esc(c.color || "#1e4f8f")};flex:none;"></span>
          <div class="meta">
            <div class="title">${esc(c.title)}</div>
            <span class="kind">${(lessons || []).filter(l => l.course_id === c.id).length} lessons ·
              ${used}${lic?.seats ? " / " + lic.seats : ""} students enrolled${
              lic?.expires_on ? " · license until " + esc(lic.expires_on) : ""}</span>
          </div>
        </div>`;
      }).join("");

      const progRows = (enrollments || []).flatMap(e =>
        (lessons || []).filter(l => l.course_id === e.course_id).map(l => {
          const p = (prog || []).find(x => x.student_id === e.student_id && x.lesson_id === l.id);
          return { sid: e.student_id, lesson: l, cid: e.course_id,
                   status: p?.status || "not_started", date: p?.updated_at };
        }));

      app.innerHTML = `
        <p class="eyebrow">Teacher</p>
        <h1>My teaching</h1>

        <div class="stat-grid" style="margin-bottom:1rem;">
          ${stat("My courses", (courses || []).length)}
          ${stat("My students", myStudents.length)}
          ${stat("Lessons completed", (prog || []).filter(p => p.status === "completed").length, "by my students")}
        </div>

        <div class="card">
          <h2>My courses</h2>
          ${courseCards || `<p class="empty">No courses assigned to you yet — ask your administrator (or the platform owner).</p>`}
        </div>

        <div class="card">
          <h2>Add a student account</h2>
          <div class="form-row">
            <div class="field"><label>Email</label><input id="ns-email" placeholder="student@example.com" /></div>
            <div class="field" style="max-width:170px;"><label>Password</label><input id="ns-pass" placeholder="min 6 characters" /></div>
            <div class="field"><label>Full name (optional)</label><input id="ns-name" /></div>
            <button id="ns-add">Create student</button>
          </div>
          <p id="ns-msg" class="msg"></p>
        </div>

        <div class="card">
          <h2>Enroll a student in a course</h2>
          <div class="form-row">
            <div class="field"><label>Student</label>
              <select id="en-student">${studentOptions || `<option value="">No students yet</option>`}</select></div>
            <div class="field"><label>Course</label>
              <select id="en-course">${courseOptions || `<option value="">No courses yet</option>`}</select></div>
            <button id="en-add">Enroll</button>
          </div>
          <p id="en-msg" class="msg"></p>
          ${(enrollments || []).length ? `
          <table style="margin-top:0.75rem;">
            <thead><tr><th>Student</th><th>Course</th><th></th></tr></thead>
            <tbody>${(enrollments || []).map(e => `
              <tr>
                <td>${esc(nameOf(sById(e.student_id)))}</td>
                <td>${esc(cTitle(e.course_id))}</td>
                <td><button class="ghost en-remove" data-id="${e.id}">Remove</button></td>
              </tr>`).join("")}</tbody>
          </table>` : `<p class="empty" style="margin-top:0.75rem;">No enrollments yet.</p>`}
        </div>

        <div class="card">
          <h2>My students</h2>
          ${myStudents.length ? `
          <table>
            <thead><tr><th>Student</th><th>Email</th><th>Completed</th><th>Study time</th><th>Last active</th></tr></thead>
            <tbody>${myStudents.map(s => `
              <tr>
                <td>${esc(nameOf(s))}${s.suspended ? ' <span class="pill off">suspended</span>' : ""}</td>
                <td>${esc(s.email || "—")}</td>
                <td>${doneBy[s.id] || 0} lessons</td>
                <td>${fmtTime(timeBy[s.id] || 0)}</td>
                <td>${lastBy[s.id] ? new Date(lastBy[s.id]).toLocaleDateString() : "never"}</td>
              </tr>`).join("")}</tbody>
          </table>` : `<p class="empty">No students yet — create an account above, then enroll them in a course.</p>`}
        </div>

        <div class="card">
          <h2>Student progress <span class="kind" id="tp-count"></span></h2>
          <div class="form-row" style="margin-bottom:0.6rem;">
            <div class="field" style="max-width:200px;"><label>Course</label>
              <select id="tp-course"><option value="all">All courses</option>${courseOptions}</select></div>
            <div class="field" style="max-width:200px;"><label>Student</label>
              <select id="tp-student"><option value="all">All students</option>
                ${myStudents.map(s => `<option value="${s.id}">${esc(nameOf(s))}</option>`).join("")}</select></div>
          </div>
          <div id="tp-table"></div>
        </div>

        <div class="card">
          <h2>Announcements to my students</h2>
          <div class="form-row">
            <div class="field"><label>Message</label><input id="an-body" placeholder="e.g. Homework for this week…" /></div>
            <div class="field" style="max-width:200px;"><label>Course</label>
              <select id="an-course">${courseOptions}</select></div>
            <button id="an-add">Post</button>
          </div>
          <p id="an-msg" class="msg"></p>
          ${(anns || []).map(a => `
            <div class="lesson">
              <span class="icon">📣</span>
              <div class="meta">
                <div class="title" style="font-weight:500;">${esc(String(a.body).replace(/<[^>]*>/g, "").slice(0, 140))}</div>
                <span class="kind">${esc(cTitle(a.course_id))} · ${new Date(a.created_at).toLocaleDateString()}</span>
              </div>
              <button class="ghost an-del" data-id="${a.id}"
                      style="color:var(--danger); border-color:var(--danger);">Delete</button>
            </div>`).join("")}
        </div>
        <footer class="hub-footer">Thong's Learning Hub</footer>`;

      // ---- wiring ----
      const STATUS_PILL = {
        completed: '<span class="pill done">completed</span>',
        in_progress: '<span class="pill todo">in progress</span>',
        not_started: '<span class="kind">not started</span>'
      };
      function renderProg() {
        const fc = document.getElementById("tp-course").value;
        const fs = document.getElementById("tp-student").value;
        const list = progRows.filter(r =>
          (fc === "all" || r.cid === fc) && (fs === "all" || r.sid === fs));
        document.getElementById("tp-count").textContent = "(" + list.length + " records)";
        document.getElementById("tp-table").innerHTML = list.length ? `
          <table>
            <thead><tr><th>Student</th><th>Lesson</th><th>Course</th><th>Status</th><th>Updated</th></tr></thead>
            <tbody>${list.map(r => `
              <tr>
                <td>${esc(nameOf(sById(r.sid)))}</td>
                <td>${esc(r.lesson.title)}</td>
                <td>${esc(cTitle(r.cid))}</td>
                <td>${STATUS_PILL[r.status] || esc(r.status)}</td>
                <td>${r.date ? new Date(r.date).toLocaleDateString() : "—"}</td>
              </tr>`).join("")}</tbody>
          </table>` : `<p class="empty">No records yet.</p>`;
      }
      document.getElementById("tp-course").addEventListener("change", renderProg);
      document.getElementById("tp-student").addEventListener("change", renderProg);
      renderProg();

      document.getElementById("ns-add").addEventListener("click", async () => {
        const m = document.getElementById("ns-msg");
        const email = document.getElementById("ns-email").value.trim();
        const password = document.getElementById("ns-pass").value;
        const full_name = document.getElementById("ns-name").value.trim() || null;
        m.className = "msg";
        if (!email || password.length < 6) {
          m.textContent = "Enter an email and a password of at least 6 characters.";
          m.className = "msg err"; return;
        }
        m.textContent = "Creating account…";
        try {
          await createUser({ action: "create", email, password, full_name, role: "student" });
          m.textContent = "Student account created ✓ — now enroll them in a course below.";
          setTimeout(render, 1200);
        } catch (err) { m.textContent = "Could not create: " + err.message; m.className = "msg err"; }
      });

      document.getElementById("en-add").addEventListener("click", async () => {
        const m = document.getElementById("en-msg");
        const student_id = document.getElementById("en-student").value;
        const course_id = document.getElementById("en-course").value;
        if (!student_id || !course_id) { m.textContent = "Pick a student and a course."; m.className = "msg err"; return; }
        const { error } = await sb.from("enrollments").insert({
          student_id, course_id, teacher_id: user.id, org_id: myOrg });
        if (error) {
          m.textContent = error.code === "23505"
            ? "That student is already enrolled in that course."
            : (error.message.includes("seat limit")
               ? "Seat limit reached for this course — contact the platform owner for more seats."
               : "Could not enroll: " + error.message);
          m.className = "msg err"; return;
        }
        render();
      });

      app.querySelectorAll(".en-remove").forEach(btn => btn.addEventListener("click", async () => {
        if (!confirm("Remove this enrollment? The student loses access to that course.")) return;
        const { error } = await sb.from("enrollments").delete().eq("id", btn.getAttribute("data-id"));
        if (error) { alert("Could not remove: " + error.message); return; }
        render();
      }));

      document.getElementById("an-add").addEventListener("click", async () => {
        const m = document.getElementById("an-msg");
        const body = document.getElementById("an-body").value.trim();
        const course_id = document.getElementById("an-course").value || null;
        if (!body) { m.textContent = "Write a message first."; m.className = "msg err"; return; }
        if (!course_id) { m.textContent = "Pick a course."; m.className = "msg err"; return; }
        const { error } = await sb.from("announcements").insert({
          body, course_id, author_id: user.id, org_id: myOrg });
        if (error) { m.textContent = "Could not post: " + error.message; m.className = "msg err"; return; }
        render();
      });

      app.querySelectorAll(".an-del").forEach(btn => btn.addEventListener("click", async () => {
        if (!confirm("Delete this announcement?")) return;
        const { error } = await sb.from("announcements").delete().eq("id", btn.getAttribute("data-id"));
        if (error) { alert("Could not delete: " + error.message); return; }
        render();
      }));
    }

    start();
  </script>
</body>
</html>
