<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thong's Learning Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-wrap">
    <div class="login-card">
      <p class="eyebrow">Thong's Learning Hub</p>
      <h1 data-i18n="signin_title">Sign in</h1>
      <p data-i18n="signin_sub" style="color:var(--muted); margin:0 0 1.5rem; font-size:0.9rem;">
        Use the email and password your teacher gave you.
      </p>

      <div class="field">
        <label for="email" data-i18n="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password" data-i18n="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="signin" data-i18n="signin_btn" style="width:100%;">Sign in</button>
      <p style="text-align:center; margin:0.9rem 0 0;">
        <a href="#" id="forgot" data-i18n="forgot" style="font-size:0.85rem;">Forgot password?</a>
      </p>
      <p id="msg" class="msg"></p>
      <p style="text-align:center; margin:1.1rem 0 0; border-top:1px solid var(--line); padding-top:0.9rem;">
        <a href="#" id="lang-toggle" style="font-size:0.85rem; color:var(--muted);"></a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="config.js"></script>
  <script>
    applyI18n();
    const langLink = document.getElementById("lang-toggle");
    langLink.textContent = t("lang_name");
    langLink.addEventListener("click", (e) => { e.preventDefault(); setLang(otherLang()); });

    const msg = document.getElementById("msg");

    // Arrived here because the account was signed in on another device?
    if (new URLSearchParams(location.search).get("kicked")) {
      msg.textContent = t("msg_kicked");
      msg.className = "msg err";
    }

    // If already logged in, skip straight to the dashboard.
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = "dashboard.html";
    });

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      msg.textContent = "";
      msg.className = "msg";

      if (!email || !password) {
        msg.textContent = t("msg_enter_both");
        msg.className = "msg err";
        return;
      }

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = t("msg_bad_login");
        msg.className = "msg err";
        return;
      }

      // One device per account: mark THIS device as the active one
      // and revoke every other device's session.
      try {
        const device = crypto.randomUUID();
        localStorage.setItem("hub_device", device);
        const { data: { user } } = await sb.auth.getUser();
        await sb.from("profiles").update({ active_session: device }).eq("id", user.id);
        await sb.auth.signOut({ scope: "others" });
        // login history
        const ua = navigator.userAgent;
        const dtp = /iPad|Tablet/i.test(ua) ? "tablet"
          : (/Mobi|iPhone|Android.*Mobile/i.test(ua) ? "mobile" : "desktop");
        const os = /Windows/i.test(ua) ? "Windows" : /Mac OS X/i.test(ua) ? "macOS"
          : /Android/i.test(ua) ? "Android" : /iPhone|iPad/i.test(ua) ? "iOS" : "other";
        const br = /Edg\//.test(ua) ? "Edge" : /Chrome\//.test(ua) ? "Chrome"
          : /Firefox\//.test(ua) ? "Firefox" : /Safari\//.test(ua) ? "Safari" : "other";
        await sb.from("access_events").insert({
          student_id: user.id, event: "login",
          device, device_type: dtp, agent: os + " · " + br
        });
      } catch (e) { /* non-fatal: login still proceeds */ }

      window.location.href = "dashboard.html";
    }

    document.getElementById("signin").addEventListener("click", signIn);

    document.getElementById("forgot").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      msg.className = "msg";
      if (!email) {
        msg.textContent = t("msg_type_email_first");
        msg.className = "msg err";
        return;
      }
      // Send a reset link that lands on reset.html of THIS site.
      const redirectTo = new URL("reset.html", window.location.href).href;
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
      msg.textContent = error ? t("msg_reset_fail") : t("msg_reset_sent");
      if (error) msg.className = "msg err";
    });

    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") signIn();
    });
  </script>
</body>
</html>
